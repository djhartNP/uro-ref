  .claude-response ul, .claude-response ol { padding-left: 22px; }

  .claude-response .cite { color: var(--accent); text-decoration: underline; cursor: pointer; }
  .claude-footer { margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-faint); font-style: italic; }
  .claude-error { background: rgba(160,64,64,0.08); border: 1px solid var(--danger); color: var(--danger); padding: 12px 14px; border-radius: 8px; margin-top: 12px; font-size: 14px; }
  .claude-loading { color: var(--text-dim); font-style: italic; padding: 20px; text-align: center; }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(40,36,30,0.55); z-index: 100; display: grid; place-items: center; padding: 16px; }
  .modal { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px; padding: 20px; max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-family: var(--serif); margin: 0 0 14px; font-size: 20px; color: var(--accent); }
  .modal label { display: block; font-size: 13px; color: var(--text-dim); margin: 12px 0 4px; }
  .modal-close { float: right; color: var(--text-dim); font-size: 22px; margin-top: -4px; }
  .modal .model-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 6px; }

  .gap-item .gap-text { color: var(--text); }

const CARDS = [
  {
    id: 'bph',
    category: 'clinical',
    title: 'BPH / LUTS (Male)',
    tags: ['luts', 'bph', 'male', 'medical mgmt'],
    tldr: 'Most common cause of LUTS in men >50. Quantify with IPSS/AUA-SI. Start alpha blocker for symptoms; add 5-ARI for larger glands (>30-40cc); combine if severe. Refer for surgery if refractory, retention, or complications.',
    body: `
      <h2>Workup</h2>
      <ul>
        <li><strong>IPSS / AUA-SI</strong> score (0-35): mild 0-7, moderate 8-19, severe 20-35</li>
        <li><strong>DRE</strong>: size/consistency/nodules; rule out prostate ca</li>
        <li><strong>UA</strong> (rule out infection, hematuria)</li>
        <li><strong>PSA</strong> if life expectancy >10 yr and would affect management</li>
        <li><strong>Post-void residual</strong> (bladder scan): elevated suggests retention risk</li>
        <li><strong>Uroflowmetry</strong> if available: Qmax &lt;10 mL/s suggests obstruction</li>
      </ul>

      <h2>Medical Management</h2>
      <ul>
        <li><strong>Alpha blockers</strong> (fast relief, days): tamsulosin 0.4 mg qhs (most common), silodosin, alfuzosin, doxazosin. Watch for orthostasis, floppy iris syndrome (tell ophthalmology before cataract surgery).</li>
        <li><strong>5-alpha reductase inhibitors</strong> (slow, weeks-months): finasteride 5 mg daily or dutasteride 0.5 mg daily. Best for prostates >30-40 cc. Halves PSA (double the measured value for ca screening). Side effects: ED, decreased libido.</li>
        <li><strong>Combination</strong> (alpha blocker + 5-ARI): best for moderate-severe symptoms with enlarged gland. MTOPS, CombAT trials.</li>
        <li><strong>Antimuscarinic or beta-3 agonist</strong> (mirabegron): add if significant storage/OAB component after obstruction addressed.</li>
        <li><strong>Tadalafil 5 mg daily</strong>: approved for LUTS + ED together.</li>
      </ul>

      <h2>Surgical Referral Triggers</h2>
      <ul>
        <li>Refractory symptoms despite adequate medical therapy</li>
        <li>Recurrent UTIs attributable to retention</li>
        <li>Bladder stones</li>
        <li>Recurrent gross hematuria attributable to BPH</li>
        <li>Acute urinary retention (especially recurrent)</li>
        <li>Renal insufficiency from obstruction</li>
        <li>Patient preference (declining medical therapy)</li>
      </ul>
      <p>Procedures by gland size and patient factors: UroLift and Rezum (smaller glands, preserves ejaculation), TURP (workhorse, <80 cc), PVP/GreenLight laser, HoLEP or Aquablation (large glands).</p>

      <div class="redflag"><strong>Red flags:</strong> Acute retention, gross hematuria with clots, refractory symptoms, new-onset LUTS &lt;45 (rare BPH), neurologic symptoms (MS, spinal cord pathology).</div>

      <h2>Pearls</h2>
      <ul>
        <li>Ask about OTC meds: decongestants and anticholinergics can precipitate retention.</li>
        <li>Nocturia workup is broader than BPH: consider sleep apnea, CHF, diabetes, nocturnal polyuria (&gt;33% of 24h output overnight).</li>
        <li>If starting 5-ARI, recheck and document PSA at 6 mo to establish new baseline; any later rise is significant.</li>
      </ul>
    `,
    sources: [
      { label: 'AUA: Management of BPH (2023)', url: 'https://www.auanet.org/guidelines-and-quality/guidelines/benign-prostatic-hyperplasia-(bph)-guideline' }
    ]
  },

  {
    id: 'cystitis',
    category: 'clinical',
    title: 'Uncomplicated Cystitis (Women)',
    tags: ['uti', 'female', 'infection', 'antibiotics'],
    tldr: 'Dysuria, frequency, urgency in non-pregnant, non-immunocompromised woman with normal GU tract and no fever. Diagnose clinically; UA confirms. First-line: nitrofurantoin 5 days or fosfomycin single dose. Culture only if atypical, pregnant, or treatment failure.',
    body: `
      <h2>Diagnosis</h2>
      <ul>
        <li>Classic triad: <strong>dysuria, frequency, urgency</strong>; often suprapubic discomfort</li>
        <li><strong>UA</strong>: pyuria (leuk esterase +), nitrites (specific for Enterobacteriaceae, not sensitive); hematuria common</li>
        <li><strong>Culture</strong> not required for uncomplicated first episode; obtain if: pregnancy, symptoms atypical, recent abx, treatment failure, recurrent UTI</li>
      </ul>

      <h2>First-Line Empiric Therapy</h2>
      <ul>
        <li><strong>Nitrofurantoin 100 mg BID x 5 days</strong> (avoid if CrCl &lt;30, pyelonephritis suspected)</li>
        <li><strong>Fosfomycin 3 g PO x 1 dose</strong> (convenient; slightly less efficacy)</li>
        <li><strong>TMP-SMX DS BID x 3 days</strong> (only if local E. coli resistance &lt;20% and no use in past 3 mo)</li>
      </ul>

      <h2>Second-Line</h2>
      <ul>
        <li><strong>Beta-lactams</strong> (amox-clav, cephalexin, cefpodoxime) x 5-7 days — inferior to first-line but OK when others contraindicated</li>
        <li><strong>Fluoroquinolones</strong> (cipro, levo) — reserve due to collateral damage, tendon/CNS risks, C. diff</li>
      </ul>

      <h2>Recurrent UTI (≥2 in 6 mo OR ≥3 in 1 yr)</h2>
      <ul>
        <li>Evaluate: UA, culture, PVR; cystoscopy and upper-tract imaging considered in women with risk factors</li>
        <li>Prevention: topical vaginal estrogen in post-menopausal women (strong evidence), cranberry (weak), increased fluids</li>
        <li>Prophylaxis options: daily low-dose (nitrofurantoin 50-100 mg), post-coital single dose, self-start therapy</li>
        <li>Methenamine hippurate: non-antibiotic prevention option</li>
      </ul>

      <div class="redflag"><strong>Red flags:</strong> Fever, flank pain, CVA tenderness, N/V → pyelonephritis workup. Visible hematuria → complete AUA hematuria workup even if UTI found. Male "cystitis" is not uncomplicated — workup for complicated source.</div>

      <h2>Pearls</h2>
      <ul>
        <li>Asymptomatic bacteriuria: <strong>do not treat</strong> except in pregnancy or before urologic procedures with mucosal trauma.</li>
        <li>Dysuria without pyuria: consider vulvovaginitis, atrophic vaginitis, STI, urethral syndrome.</li>
        <li>Post-menopausal women with recurrent UTI: topical estrogen is the highest-yield single intervention.</li>
      </ul>
    `,
    sources: [
      { label: 'AUA: Recurrent Uncomplicated UTI in Women (2022)', url: 'https://www.auanet.org/guidelines-and-quality/guidelines/recurrent-uti' },
      { label: 'IDSA: Uncomplicated UTI', url: 'https://www.idsociety.org/practice-guideline/uncomplicated-urinary-tract-infection/' }
    ]
  },

  {
    id: 'pyelo',
    category: 'clinical',
    title: 'Pyelonephritis / Complicated UTI',
    tags: ['uti', 'infection', 'pyelonephritis', 'emergency'],
    tldr: 'UTI + fever, flank pain, N/V. Obtain culture and blood work; image with CT abd/pelvis if failing treatment, diabetic, stone history, or concern for obstruction. Treat IV if toxic, oral if stable. Obstructed infected kidney = urgent decompression.',
    body: `
      <h2>Presentation & Workup</h2>
      <ul>
        <li><strong>Symptoms</strong>: dysuria/frequency PLUS fever (&gt;38°C), flank pain, CVA tenderness, N/V, sometimes sepsis</li>
        <li><strong>Labs</strong>: UA (pyuria, often nitrite +), <strong>urine culture with sensitivities</strong>, CBC (leukocytosis), BMP (creatinine), lactate if septic</li>
        <li><strong>Blood cultures</strong>: if ill-appearing, diabetic, immunocompromised, or being admitted</li>
        <li><strong>Imaging</strong> (CT abd/pelvis with IV contrast if renal function allows):
          <ul>
            <li>Failing therapy at 48-72h</li>
            <li>Diabetic, immunocompromised, or stone history</li>
            <li>Recurrent pyelonephritis</li>
            <li>Suspicion of obstruction, abscess, or emphysematous pyelonephritis</li>
          </ul>
        </li>
      </ul>

      <h2>Treatment — Outpatient (stable, tolerating PO, no red flags)</h2>
      <ul>
        <li><strong>Ciprofloxacin 500 mg BID x 7 days</strong> (if local FQ resistance &lt;10%)</li>
        <li><strong>Levofloxacin 750 mg daily x 5 days</strong></li>
        <li><strong>TMP-SMX DS BID x 14 days</strong> (only with proven susceptibility — avoid empirically)</li>
        <li>Consider single IV/IM dose of ceftriaxone 1 g or aminoglycoside at initial visit, then transition to PO</li>
      </ul>

      <h2>Treatment — Inpatient</h2>
      <ul>
        <li><strong>Ceftriaxone 1-2 g IV daily</strong> (first-line if stable)</li>
        <li><strong>Piperacillin-tazobactam</strong> or carbapenem if septic, healthcare-associated, or ESBL risk</li>
        <li>Narrow by culture; total course typically 10-14 days</li>
        <li>Transition to PO once afebrile 24-48 h and tolerating</li>
      </ul>

      <div class="redflag"><strong>Urgent: Obstructed, infected kidney = urologic emergency.</strong> Needs drainage (percutaneous nephrostomy or ureteral stent) WITH antibiotics. Do not just treat with abx. Source control is critical — can progress to urosepsis rapidly.</div>

      <h2>Complications to Recognize</h2>
      <ul>
        <li><strong>Renal/perinephric abscess</strong>: failure to defervesce &gt;72h on appropriate abx — drain if &gt;3 cm</li>
        <li><strong>Emphysematous pyelonephritis</strong>: gas in renal parenchyma, usually diabetic — mortality 20%+; nephrectomy often required</li>
        <li><strong>Papillary necrosis</strong>: diabetic, sickle cell, analgesic overuse</li>
        <li><strong>Xanthogranulomatous pyelonephritis</strong>: chronic, stone-associated; usually requires nephrectomy</li>
      </ul>

      <h2>Pearls</h2>
      <ul>
        <li>Follow-up culture in pregnancy at completion; otherwise not needed if clinically improved.</li>
        <li>Do NOT miss diabetes in a first-time severe pyelonephritis.</li>
        <li>Recurrent pyelo in a woman: upper-tract imaging and cystoscopy indicated.</li>
      </ul>
    `,
    sources: [
      { label: 'AUA/CUA/SUFU: Recurrent UTI', url: 'https://www.auanet.org/guidelines-and-quality/guidelines/recurrent-uti' },
      { label: 'IDSA pyelonephritis guidance', url: 'https://www.idsociety.org/practice-guideline/uncomplicated-urinary-tract-infection/' }
    ]
  },

  {
    id: 'stones',
    category: 'clinical',
    title: 'Renal Colic / Nephrolithiasis (Acute)',
    tags: ['stones', 'pain', 'emergency', 'imaging'],
    tldr: 'Sudden severe flank pain, often radiating to groin, with N/V and hematuria. Non-contrast CT KUB is gold standard. Most stones <5 mm pass spontaneously; 5-10 mm benefit from MET (alpha blocker). Infection + obstruction = urgent drainage.',
    body: `
      <h2>Presentation</h2>
      <ul>
        <li>Acute colicky flank/abdominal pain, often radiates to groin/genitals</li>
        <li>Restless (can't find comfortable position — unlike peritonitis)</li>
        <li>N/V (very common)</li>
        <li><strong>Microscopic or gross hematuria</strong> in ~90% (but absence doesn't rule out)</li>
        <li>Dysuria/urgency if stone at ureterovesical junction</li>
      </ul>

      <h2>Workup</h2>
      <ul>
        <li><strong>UA</strong>: hematuria, crystals, pyuria (careful — sterile pyuria can occur from inflammation; if true infection, urgent!)</li>
        <li><strong>BMP</strong>: baseline creatinine</li>
        <li><strong>CBC</strong>: leukocytosis may indicate infection</li>
        <li><strong>Non-contrast CT KUB</strong>: gold standard, &gt;95% sensitivity. Reports: stone size, location, laterality, hydronephrosis degree, presence of double J / anatomic variants</li>
        <li><strong>Ultrasound</strong>: preferred in pregnancy and young women; less sensitive for stones but detects hydronephrosis</li>
        <li><strong>KUB x-ray</strong>: useful for tracking radiopaque stones over time</li>
      </ul>

      <h2>Acute Management</h2>
      <ul>
        <li><strong>Hydration</strong>: oral if tolerating; IV if not</li>
        <li><strong>NSAIDs first-line</strong> (more effective than opioids for colic): ketorolac 15-30 mg IV/IM (caution: eGFR)</li>
        <li><strong>Opioids</strong> as adjunct or if NSAIDs contraindicated</li>
        <li><strong>Antiemetics</strong>: ondansetron 4 mg IV</li>
        <li><strong>Medical expulsive therapy (MET)</strong>: tamsulosin 0.4 mg daily for ureteral stones 5-10 mm, duration up to 4-6 wk (nifedipine alternative)</li>
      </ul>

      <h2>Likelihood of Spontaneous Passage</h2>
      <ul>
        <li>&lt;4 mm: ~80-90%</li>
        <li>5-6 mm: ~50-60%</li>
        <li>7-9 mm: ~20-30%</li>
        <li>&gt;10 mm: very unlikely — plan intervention</li>
      </ul>

      <h2>Indications for Urologic Intervention</h2>
      <ul>
        <li><strong>Infection + obstruction = urgent drainage</strong> (PCN or ureteral stent) — do not delay</li>
        <li>Uncontrolled pain despite adequate analgesia</li>
        <li>Intractable N/V preventing oral intake</li>
        <li>Solitary kidney or bilateral obstruction</li>
        <li>Acute kidney injury attributable to obstruction</li>
        <li>Stone failing to progress after ~4-6 weeks of observation + MET</li>
      </ul>

      <h2>Definitive Treatments (not urgent in most cases)</h2>
      <ul>
        <li><strong>Shock wave lithotripsy (SWL)</strong>: non-invasive; less effective for large, hard, or lower-pole stones</li>
        <li><strong>Ureteroscopy (URS) with laser lithotripsy</strong>: most common; high stone-free rates; stent often placed</li>
        <li><strong>Percutaneous nephrolithotomy (PCNL)</strong>: for large (&gt;2 cm) or complex renal stones</li>
      </ul>

      <div class="redflag"><strong>Red flags — urgent consult:</strong> Fever/signs of infection with obstructing stone. AKI. Solitary kidney with obstruction. Pregnancy with obstruction. Anuria. Uncontrolled pain.</div>

      <h2>Metabolic Workup</h2>
      <ul>
        <li>First stone in low-risk patient: basic workup (stone analysis, serum chem, UA)</li>
        <li>Recurrent stones, children, or high-risk: 24-hour urine collections x 2, parathyroid evaluation if hypercalciuria/hypercalcemia</li>
        <li>Prevention: increase fluids to goal 2.5L urine/day; dietary counseling (sodium, animal protein, oxalate for calcium oxalate stones)</li>
      </ul>
    `,

      { label: 'AUA: Medical Management of Stones (2014, amended)', url: 'https://www.auanet.org/guidelines-and-quality/guidelines/medical-management-of-kidney-stones-guideline' }

        <li><strong>CT urogram</strong> (non-contrast + contrast with delayed excretory phase) — evaluates upper tracts and bladder</li>
        <li><strong>MR urogram</strong> if iodine contrast contraindicated</li>
        <li><strong>Renal ultrasound + retrograde pyelogram</strong> if neither CT nor MR feasible</li>
        <li><strong>Urine cytology</strong>: consider in high-risk patients (smoker, occupational exposure, older age, CIS concern)</li>
      </ul>

      <h2>Differential</h2>
      <ul>
        <li><strong>Malignancy</strong>: bladder cancer &gt; upper tract urothelial &gt; RCC — ~20% yield of workup for gross hematuria over age 50</li>
        <li><strong>Stones</strong> (see card)</li>
        <li><strong>Infection</strong> — does NOT complete the workup</li>
        <li><strong>BPH</strong>: diagnosis of exclusion after tumor ruled out</li>
        <li><strong>Trauma, catheter-related, recent instrumentation</strong></li>
        <li><strong>Glomerular disease</strong> (dysmorphic RBCs, casts, proteinuria) → nephrology</li>
        <li>Anticoagulation does not explain hematuria — workup is still indicated</li>
      </ul>

      <ul>

        <li><strong>Painless gross hematuria</strong>: classic for bladder ca; cysto and upper-tract imaging are not optional</li>
        <li><strong>Hematuria with fever</strong>: may indicate infected tumor or pyelonephritis</li>

    body: `
      <h2>Pre-Procedure Counseling</h2>

        <li><strong>No STI protection</strong></li>
        <li><strong>Contraception required</strong> until azoospermia confirmed on semen analysis</li>
        <li>No change in testosterone, libido, erectile function, or ejaculate volume (sperm is &lt;5% of volume)</li>
        <li>Alternatives discussed: female tubal ligation, long-acting reversible contraception</li>
        <li>Partner involvement in decision strongly encouraged</li>

      <h2>Procedure</h2>

function esc(s) { return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function filterCards() {
  const q = state.search.toLowerCase().trim();
  return CARDS.filter((c) => {
    if (state.category !== 'all' && c.category !== state.category) return false;
    if (!q) return true;
    return (
      c.title.toLowerCase().includes(q) ||
      c.tags.some((t) => t.toLowerCase().includes(q)) ||
      c.tldr.toLowerCase().includes(q) ||
      (c.body || '').toLowerCase().includes(q)
    );
  });
}

function cardById(id) { return CARDS.find((c) => c.id === id); }
function flowchartById(id) { return FLOWCHARTS.find((f) => f.id === id); }

function save(key) { LS.set(key, state[key]); }

/* Light-weight markdown for Claude's response. Supports:
   ## headings, - bullets, 1. ordered lists, **bold**, *italic*, [card:id] citations */
function renderMarkdown(text) {
  const lines = text.split('\n');
  const out = [];
  let inUl = false, inOl = false;
  const flushLists = () => {
    if (inUl) { out.push('</ul>'); inUl = false; }
    if (inOl) { out.push('</ol>'); inOl = false; }
  };
  for (const raw of lines) {
    const line = raw.trimEnd();
    if (!line.trim()) { flushLists(); continue; }
    if (/^## /.test(line)) { flushLists(); out.push('<h2>' + inlineMd(line.replace(/^## /, '')) + '</h2>'); continue; }
    if (/^# /.test(line)) { flushLists(); out.push('<h2>' + inlineMd(line.replace(/^# /, '')) + '</h2>'); continue; }
    const ulMatch = line.match(/^\s*-\s+(.*)$/);
    if (ulMatch) {
      if (!inUl) { flushLists(); out.push('<ul>'); inUl = true; }
      out.push('<li>' + inlineMd(ulMatch[1]) + '</li>');
      continue;
    }
    const olMatch = line.match(/^\s*\d+\.\s+(.*)$/);
    if (olMatch) {
      if (!inOl) { flushLists(); out.push('<ol>'); inOl = true; }
      out.push('<li>' + inlineMd(olMatch[1]) + '</li>');
      continue;
    }
    flushLists();
    out.push('<p>' + inlineMd(line) + '</p>');
  }
  flushLists();
  return out.join('');
}

function inlineMd(s) {
  let out = esc(s);
  out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  out = out.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  out = out.replace(/\[card:([a-z0-9-]+)\]/gi, (m, id) => {
    const c = cardById(id);
    if (!c) return '<span class="cite" style="opacity:.6;">[card:' + esc(id) + ']</span>';
    return '<span class="cite" data-cite="' + esc(id) + '" title="' + esc(c.title) + '">[' + esc(c.title) + ']</span>';
  });
  return out;
}

function renderGlossaryView() {
  const q = state.glossarySearch.toLowerCase().trim();
  const filtered = q
    ? GLOSSARY.filter((g) => g.abbr.toLowerCase().includes(q) || g.full.toLowerCase().includes(q) || (g.note || '').toLowerCase().includes(q))
    : GLOSSARY.slice().sort((a, b) => a.abbr.localeCompare(b.abbr, undefined, { sensitivity: 'base' }));
  return `
    <h2 style="font-family:var(--serif);color:var(--accent);margin:0 0 6px;font-size:20px;">Glossary</h2>
    <p style="color:var(--text-dim);font-size:14px;margin:0 0 14px;">Common urology abbreviations and clinical shorthand. Tap to search.</p>
    <div class="search-bar">
      <input type="search" placeholder="Search abbreviations..." value="${esc(state.glossarySearch)}" data-field="gloss-search" autocomplete="off">
    </div>
    <div class="gloss-list">
      ${filtered.length === 0 ? '<div class="empty">No matches.</div>' : filtered.map((g) => `
        <div class="gloss-item">
          <div class="abbr">${esc(g.abbr)}</div>
          <div>
            <div class="full">${esc(g.full)}</div>
            ${g.note ? `<div class="note">${esc(g.note)}</div>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderGapsView() {
  return `
    <div>
      <h2 style="font-family:var(--serif);color:var(--accent);margin:0 0 6px;font-size:20px;">Knowledge Gaps</h2>
      <p style="color:var(--text-dim);font-size:14px;margin:0 0 14px;">One-tap log of things you encountered and want to review. Turns real clinical encounters into v2 content.</p>
      <button class="claude-submit" style="width:auto;padding:10px 16px;" data-act="add-gap">+ Log a gap</button>
      <div style="margin-top:16px;">
        ${state.gaps.length === 0 ? '<div class="empty">No gaps logged yet. Tap "Log a gap" when you hit something at clinic you want to review.</div>' :
          state.gaps.slice().reverse().map((g, i) => {
            const realIndex = state.gaps.length - 1 - i;
            return `
              <div class="gap-item">
                <div style="flex:1;">
                  <div class="gap-text">${esc(g.text)}</div>
                  <div class="gap-date">${esc(new Date(g.timestamp).toLocaleString())}</div>
                </div>
                <button class="gap-del" data-del-gap="${realIndex}" title="Delete">×</button>
              </div>
            `;
          }).join('')
        }
      </div>
      ${state.gaps.length > 0 ? `<button class="back-btn" style="margin-top:20px;" data-act="export-gaps">Export gaps as text →</button>` : ''}
    </div>
  `;
}

function renderSettings() {
  return `
    <div class="modal-backdrop" data-act="close-modal">
      <div class="modal" data-stop>
        <button class="modal-close" data-act="close-modal">×</button>
        <h2>Settings</h2>

        <label>Anthropic API Key</label>
        <input type="password" value="${esc(state.apiKey)}" data-field="apiKey" placeholder="sk-ant-..." autocomplete="off">
        <div class="hint">Stored in this browser's localStorage only. Never uploaded to any server except api.anthropic.com when you ask Claude. Get a key at console.anthropic.com.</div>

        <label>Model</label>
        <div class="model-toggle">
          <button class="model-opt ${state.model === 'claude-opus-4-7' ? 'active' : ''}" data-model="claude-opus-4-7">Opus 4.7<br><span style="font-size:11px;color:var(--text-faint);">strongest</span></button>
          <button class="model-opt ${state.model === 'claude-sonnet-4-6' ? 'active' : ''}" data-model="claude-sonnet-4-6">Sonnet 4.6<br><span style="font-size:11px;color:var(--text-faint);">fast · cheap</span></button>
        </div>

        <label>Reasoning effort</label>
        <div class="model-toggle" style="grid-template-columns:repeat(3,1fr);">
          <button class="model-opt ${state.effort === 'medium' ? 'active' : ''}" data-effort="medium">Medium</button>
          <button class="model-opt ${state.effort === 'high' ? 'active' : ''}" data-effort="high">High</button>
          <button class="model-opt ${state.effort === 'max' ? 'active' : ''}" data-effort="max">Max</button>
        </div>
        <div class="hint">"Max" is Opus-only and slower/more expensive. Good for hard cases.</div>

        <button class="save-btn" data-act="save-settings">Save</button>
      </div>
    </div>
  `;
}

function renderGapAdd() {
  return `
    <div class="modal-backdrop" data-act="close-modal">
      <div class="modal" data-stop>
        <button class="modal-close" data-act="close-modal">×</button>
        <h2>Log a Gap</h2>
        <p style="font-size:13px;color:var(--text-dim);margin:0 0 8px;">What did you encounter today that you want to review later?</p>
        <textarea data-field="newGap" placeholder="e.g., BCG instillation protocol for NMIBC — didn't know the schedule" autoFocus></textarea>
        <button class="save-btn" data-act="save-gap">Save Gap</button>
      </div>
    </div>
  `;
}

/* ============================================================
   EVENT WIRING
   ============================================================ */
function wireEvents() {
  // Tabs
  document.querySelectorAll('[data-tab]').forEach((el) => {
    el.addEventListener('click', () => {
      state.view = el.dataset.tab;
      state.selectedCard = null;
      state.selectedFlowchart = null;
      state.flowchartPath = [];
      render();
    });
  });
  // Card select
  document.querySelectorAll('[data-card]').forEach((el) => {
    el.addEventListener('click', (e) => {
      e.preventDefault();
      const id = el.dataset.card;
      state.selectedCard = id;
      state.view = 'reference';
      state.selectedFlowchart = null;
      render();
      window.scrollTo(0, 0);
    });
  });
  // Back to cards
  document.querySelectorAll('[data-act="back-cards"]').forEach((el) => {
    el.addEventListener('click', () => { state.selectedCard = null; render(); });
  });
  // Search
  const searchEl = document.querySelector('[data-field="search"]');
  if (searchEl) {
    searchEl.addEventListener('input', (e) => {
      state.search = e.target.value;
      const list = document.querySelector('.card-grid');
      if (list) list.innerHTML = filterCards().map(cardItem).join('') || '<div class="empty">No cards match your search.</div>';
      document.querySelectorAll('[data-card]').forEach((el) => {
        el.addEventListener('click', () => {
          state.selectedCard = el.dataset.card;
          render();
          window.scrollTo(0, 0);
        });
      });
    });
  }
  // Category chips
  document.querySelectorAll('[data-cat]').forEach((el) => {
    el.addEventListener('click', () => { state.category = el.dataset.cat; render(); });
  });
  // Glossary search
  const glossEl = document.querySelector('[data-field="gloss-search"]');
  if (glossEl) {
    glossEl.addEventListener('input', (e) => {
      state.glossarySearch = e.target.value;
      const listEl = document.querySelector('.gloss-list');
      if (!listEl) return;
      const q = state.glossarySearch.toLowerCase().trim();
      const filtered = q
        ? GLOSSARY.filter((g) => g.abbr.toLowerCase().includes(q) || g.full.toLowerCase().includes(q) || (g.note || '').toLowerCase().includes(q))
        : GLOSSARY.slice().sort((a, b) => a.abbr.localeCompare(b.abbr, undefined, { sensitivity: 'base' }));
      listEl.innerHTML = filtered.length === 0 ? '<div class="empty">No matches.</div>' : filtered.map((g) => `
        <div class="gloss-item">
          <div class="abbr">${esc(g.abbr)}</div>
          <div>
            <div class="full">${esc(g.full)}</div>
            ${g.note ? `<div class="note">${esc(g.note)}</div>` : ''}
          </div>
        </div>
      `).join('');
    });
  }
  // Flowchart select
  document.querySelectorAll('[data-flow]').forEach((el) => {
    el.addEventListener('click', () => {
      state.selectedFlowchart = el.dataset.flow;
      state.flowchartPath = [];
      render();
      window.scrollTo(0, 0);
    });
  });
  document.querySelectorAll('[data-act="back-flows"]').forEach((el) => {
    el.addEventListener('click', () => { state.selectedFlowchart = null; state.flowchartPath = []; render(); });
  });
  // Flowchart branches
  document.querySelectorAll('[data-branch]').forEach((el) => {
    el.addEventListener('click', () => { state.flowchartPath.push(parseInt(el.dataset.branch, 10)); render(); });
  });
  document.querySelectorAll('[data-fc-reset]').forEach((el) => {
    el.addEventListener('click', () => { state.flowchartPath = []; render(); });
  });
  document.querySelectorAll('[data-fc-back]').forEach((el) => {
    el.addEventListener('click', () => { state.flowchartPath = state.flowchartPath.slice(0, parseInt(el.dataset.fcBack, 10) + 1); render(); });
  });
  // Settings open
  document.querySelectorAll('[data-act="open-settings"]').forEach((el) => {
    el.addEventListener('click', () => { state.showSettings = true; render(); });
  });
  // Modals
  document.querySelectorAll('[data-act="close-modal"]').forEach((el) => {
    el.addEventListener('click', () => { state.showSettings = false; state.showGapAdd = false; render(); });
  });
  document.querySelectorAll('[data-stop]').forEach((el) => {
    el.addEventListener('click', (e) => e.stopPropagation());
  });
  // API key field
  const keyEl = document.querySelector('[data-field="apiKey"]');
  if (keyEl) keyEl.addEventListener('input', (e) => { state.apiKey = e.target.value.trim(); });
  // Model/effort select
  document.querySelectorAll('[data-model]').forEach((el) => {
    el.addEventListener('click', () => { state.model = el.dataset.model; render(); });
  });
  document.querySelectorAll('[data-effort]').forEach((el) => {
    el.addEventListener('click', () => { state.effort = el.dataset.effort; render(); });
  });
  // Save settings
  const saveBtn = document.querySelector('[data-act="save-settings"]');
  if (saveBtn) saveBtn.addEventListener('click', () => {
    save('apiKey'); save('model'); save('effort');
    state.showSettings = false;
    render();
  });
  // Ask Claude
  const vigEl = document.querySelector('[data-field="vignette"]');
  if (vigEl) vigEl.addEventListener('input', (e) => { state.vignette = e.target.value; });
  const askBtn = document.querySelector('[data-act="ask-claude"]');
  if (askBtn) askBtn.addEventListener('click', askClaude);
  // Claude citation clicks
  document.querySelectorAll('[data-cite]').forEach((el) => {
    el.addEventListener('click', () => {
      state.view = 'reference';
      state.selectedCard = el.dataset.cite;
      render();
      window.scrollTo(0, 0);
    });
  });
  // Gaps
  const addGapBtn = document.querySelector('[data-act="add-gap"]');
  if (addGapBtn) addGapBtn.addEventListener('click', () => { state.showGapAdd = true; render(); });
  const newGapEl = document.querySelector('[data-field="newGap"]');
  if (newGapEl) setTimeout(() => newGapEl.focus(), 50);
  const saveGapBtn = document.querySelector('[data-act="save-gap"]');
  if (saveGapBtn) saveGapBtn.addEventListener('click', () => {
    const text = (newGapEl ? newGapEl.value : '').trim();
    if (!text) { state.showGapAdd = false; render(); return; }
    state.gaps.push({ text, timestamp: Date.now() });
    save('gaps');
    state.showGapAdd = false;
    render();
  });
  document.querySelectorAll('[data-del-gap]').forEach((el) => {
    el.addEventListener('click', () => {
      const i = parseInt(el.dataset.delGap, 10);
      state.gaps.splice(i, 1);
      save('gaps');
      render();
    });
  });
  const exportBtn = document.querySelector('[data-act="export-gaps"]');
  if (exportBtn) exportBtn.addEventListener('click', () => {
    const lines = state.gaps.map((g) => `[${new Date(g.timestamp).toLocaleString()}] ${g.text}`).join('\n');
    const blob = new Blob([lines], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'uro-ref-gaps.txt';
    a.click();
    URL.revokeObjectURL(url);
  });
}

/* ============================================================
   SYSTEM PROMPT for Claude (cached across requests)
   Contains all card data + flowchart data + instructions.
   ============================================================ */
function buildSystemPrompt() {
  const cardsJson = JSON.stringify(CARDS.map((c) => ({
    id: c.id, title: c.title, tldr: c.tldr,
    // strip HTML from body for token efficiency but keep structure
    body: c.body.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim(),
    sources: c.sources.map((s) => s.label)
  })), null, 2);
  const flowchartsJson = JSON.stringify(FLOWCHARTS.map((f) => ({ id: f.id, title: f.title, cardRef: f.cardRef })), null, 2);

  return `You are a clinical reasoning partner for a new urology nurse practitioner. Your role is to help her structure her own clinical reasoning using ONLY the reference cards provided below. You are NOT a diagnostician. You are NOT clinical decision support. You are a study and reasoning aid.

CRITICAL SAFETY RULES:
- Every clinical recommendation must cite a card from the reference set using the format [card:ID] (lowercase ID). Example: "Order mpMRI prostate [card:psa]."
- If the vignette describes something outside the scope of your cards, say so explicitly — do not extrapolate confidently.
- Never claim to make a diagnosis. Frame everything as "consider", "workup", "differential includes", "red flags to rule out".
- Always encourage verification against AUA/EAU guidelines and attending input.
- If a red flag is present (torsion, obstructed infected kidney, cauda equina, Fournier's), flag it prominently at the top of your response.

OUTPUT FORMAT — use this markdown structure exactly:

## Summary
(1-2 sentence framing of what this presentation most likely represents, with citation)

## Differential (ranked)
1. Most likely — brief reasoning [card:id]
2. Also consider — brief reasoning [card:id]
3. Less likely but don't miss — brief reasoning [card:id]

## Suggested workup
- Specific test or step — rationale [card:id]
- ...

## Red flags to rule out
- Finding → what it would change [card:id]
- ...

## What this is NOT
One sentence on what the reasoning does NOT cover or presumes.

## Verify
One line reminding the NP to check the cited cards and AUA source before acting.

REFERENCE CARDS:
${cardsJson}

RELATED FLOWCHARTS (the NP can open these in the app for stepwise decision trees):
${flowchartsJson}`;
}

/* ============================================================
   CLAUDE API CALL (direct from browser)
   ============================================================ */
async function askClaude() {
  if (!state.vignette.trim()) return;
  if (!state.apiKey) { state.claudeError = 'No API key. Open settings to add one.'; render(); return; }

  state.claudeLoading = true;
  state.claudeError = null;
  state.claudeResponse = null;
  state.claudeUsage = null;
  render();

  // `max` effort is Opus-only; downgrade to high for Sonnet to avoid a 400.
  const effort = (state.model !== 'claude-opus-4-7' && state.effort === 'max') ? 'high' : state.effort;

  const body = {
    model: state.model,
    max_tokens: 2000,
    system: [
      {
        type: 'text',
        text: buildSystemPrompt(),
        cache_control: { type: 'ephemeral' }
      }
    ],
    thinking: { type: 'adaptive' },
    output_config: { effort },
    messages: [
      { role: 'user', content: state.vignette.trim() }
    ]
  };

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify(body)
    });

    if (!resp.ok) {
      let errMsg = 'HTTP ' + resp.status;
      try {
        const errJson = await resp.json();
        errMsg = errJson.error ? (errJson.error.message || JSON.stringify(errJson.error)) : errMsg;
      } catch {}
      throw new Error(errMsg);
    }

    const data = await resp.json();
    // Extract text from response.content (which may contain thinking + text blocks)
    const textBlock = data.content.find((b) => b.type === 'text');
    state.claudeResponse = textBlock ? textBlock.text : '(No text returned.)';
    state.claudeUsage = data.usage;
  } catch (e) {
    state.claudeError = e.message || 'Request failed. Check your API key and try again.';
  } finally {
    state.claudeLoading = false;
    render();
  }
}

   BOOT

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
